services:
  ds.service:
    container_name: ds.service
    build:
      context: ./backend
      dockerfile: ds/Dockerfile
    ports:
      - "7242:7242"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=7242
      - ConnectionStrings__DsDbConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Kestrel__Certificates__Development__Password=${KESTREL_DEV_CERT_PASSWORD}
      - Serilog__WriteTo__1__Args__serverUrl=${SEQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      ds.service.migrations:
        condition: service_completed_successfully
      seq:
        condition: service_started
    restart: always

  ds.service.migrations:
    container_name: ds.service.migrations
    build:
      context: ./backend
      dockerfile: ds/Dockerfile
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DsDbConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    entrypoint:
      ["/bin/sh", "-c", "./efbundle"]

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ds.service
      - ds.frontend
    restart: always

  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seq:
    container_name: seq
    image: datalust/seq:latest
    ports:
      - "5341:5341"
      - "8080:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    restart: always
    volumes:
      - seq-data:/data

  ds.frontend:
    container_name: ds.frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    restart: always

volumes:
  postgres-data:
  seq-data:
